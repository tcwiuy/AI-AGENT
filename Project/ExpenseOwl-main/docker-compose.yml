services:
  expense-db:
    image: postgres:15-alpine
    container_name: expense_postgres_db
    restart: always
    environment:
      # Lấy trực tiếp từ file .env
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - expense_db_data:/var/lib/postgresql/data

volumes:
  expense_db_data: