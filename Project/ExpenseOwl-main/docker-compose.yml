version: '3.8'

services:
  expense-db:
    image: postgres:15-alpine
    container_name: expense_postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_password
      POSTGRES_DB: expense_db
    ports:
      - "5432:5432"
    volumes:
      - expense_db_data:/var/lib/postgresql/data

volumes:
  expense_db_data: